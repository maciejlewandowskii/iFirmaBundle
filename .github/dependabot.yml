version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      symfony:
        patterns:
          - "symfony/*"
      phpstan:
        patterns:
          - "phpstan/*"
      phpunit:
        patterns:
          - "phpunit/*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"