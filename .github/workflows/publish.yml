name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    name: Release & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build release archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="ifirma-bundle-${VERSION}.tar.gz"
          jq --arg v "$VERSION" '.version = $v' composer.json > composer.json.tmp
          mv composer.json.tmp composer.json
          tar -czf "/tmp/${ARCHIVE}" \
            --exclude='.git' \
            --exclude='vendor' \
            --exclude='tests' \
            --exclude='.github' \
            --exclude='.idea' \
            --exclude='.junie' \
            --exclude='.env*' \
            --exclude='*.cache' \
            --exclude='*.result.cache' \
            --transform "s|^\.|ifirma-bundle-${VERSION}|" \
            .
          mv "/tmp/${ARCHIVE}" "./${ARCHIVE}"
          echo "archive=${ARCHIVE}" >> $GITHUB_OUTPUT
        id: archive

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.archive.outputs.archive }}

      - name: Notify Packagist
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "content-type: application/json" \
            "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_TOKEN }}" \
            -d '{"repository":{"url":"https://github.com/${{ github.repository }}"}}' \
          | grep -qE '^(200|202)$' || (echo "Packagist update failed" && exit 1)
