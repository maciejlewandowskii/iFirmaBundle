name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  phpunit:
    name: PHP ${{ matrix.php-version }} ${{ matrix.dependency-versions == 'lowest' && '(lowest deps)' || '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.4']
        dependency-versions: ['highest']
        include:
          - php-version: '8.3'
            dependency-versions: 'lowest'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: xdebug
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies (highest)
        if: matrix.dependency-versions == 'highest'
        run: composer update --prefer-dist --no-progress

      - name: Install dependencies (lowest)
        if: matrix.dependency-versions == 'lowest'
        run: composer update --prefer-dist --no-progress --prefer-lowest --prefer-stable

      - name: Run tests with coverage
        run: vendor/bin/phpunit --testsuite Unit,Integration --coverage-clover=coverage.xml --coverage-html=html-report --coverage-text
        env:
          IFIRMA_USERNAME: ${{ secrets.IFIRMA_USERNAME }}
          IFIRMA_INVOICE_KEY: ${{ secrets.IFIRMA_INVOICE_KEY }}
          IFIRMA_SUBSCRIBER_KEY: ${{ secrets.IFIRMA_SUBSCRIBER_KEY }}
          IFIRMA_EXPENSE_KEY: ${{ secrets.IFIRMA_EXPENSE_KEY }}

      - name: Check coverage threshold (95%)
        run: |
          php -r '
          $xml = simplexml_load_file("coverage.xml");
          $metrics = $xml->xpath("//project/metrics")[0];
          $total = (float) $metrics["statements"];
          $covered = (float) $metrics["coveredstatements"];
          if ($total === 0.0) {
              echo "No statements found for coverage calculation.\n";
              exit(1);
          }
          $percentage = ($covered / $total) * 100;
          $required = 95.0;
          echo "Current coverage: " . sprintf("%.2f%%", $percentage) . "\n";
          echo "Required coverage: " . sprintf("%.2f%%", $required) . "\n";
          if ($percentage < $required) {
              echo "Error: Code coverage is below the required 95% threshold.\n";
              exit(1);
          }
          echo "Success: Coverage threshold met.\n";
          '

      - name: Upload coverage to Codecov
        if: matrix.php-version == '8.3' && matrix.dependency-versions == 'highest'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-php-${{ matrix.php-version }}-${{ matrix.dependency-versions }}
          path: |
            coverage.xml
            html-report/
          if-no-files-found: ignore
